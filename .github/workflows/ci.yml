# CI del daemon: vet + tests + el check de la cadena de suministro interna
# (sync-assets --check: un PR con assets embebidos viejos es ROJO, no un
# release con templates viejos en silencio).
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: harness
          POSTGRES_PASSWORD: harness
          POSTGRES_DB: harness_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U harness -d harness_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      HARNESS_PG_DSN: postgres://harness:harness@127.0.0.1:5432/harness_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - name: checkout harness-creator (público — fuente de los assets)
        uses: actions/checkout@v4
        with:
          repository: andresgarcia29/harness-creator
          path: harness-installer
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: drift de assets embebidos
        run: ./scripts/sync-assets.sh --check ./harness-installer
      - name: drift de documentación y contratos
        run: ./scripts/check-docs.sh ./harness-installer
      - name: contratos del installer
        working-directory: harness-installer
        run: bash tests/run.sh
      - name: vet + tests con detector de carreras
        run: go vet ./... && go test -race ./...
