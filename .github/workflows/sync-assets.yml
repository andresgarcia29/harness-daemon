# Reconstruye los assets embebidos (internal/gen/assets + internal/webui/dist)
# desde harness-creator cuando sus templates cambian (ADR-0003). Usa el mismo
# scripts/sync-assets.sh que el CI verifica con --check, y abre un PR — nunca
# mergea solo. Cierra la cadena harness-ui → installer → daemon.
# Requiere secret INSTALLER_TOKEN (ya usado por ci.yml): PAT con scope repo
# sobre andresgarcia29/harness-creator (clonar) y este repo (PR).
name: sync-assets
on:
  repository_dispatch:
    types: [installer-updated]
  workflow_dispatch:
jobs:
  rebuild-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: checkout harness-installer (fuente de los assets)
        uses: actions/checkout@v4
        with:
          repository: andresgarcia29/harness-creator
          token: ${{ secrets.INSTALLER_TOKEN }}
          path: harness-installer
      - name: sync-assets desde el installer
        run: ./scripts/sync-assets.sh ./harness-installer
      - name: PR si los assets cambiaron
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.INSTALLER_TOKEN }}
          branch: chore/sync-assets
          base: main
          title: "chore: sync assets embebidos desde harness-creator"
          commit-message: |
            chore: reconstruye internal/gen/assets + webui/dist desde el installer

            Automático (sync-assets.yml): harness-creator cambió.

            Task: workspace-v53
          body: |
            Automático: `harness-creator` cambió y `scripts/sync-assets.sh`
            regeneró `internal/gen/assets` y `internal/webui/dist` (el panel).
