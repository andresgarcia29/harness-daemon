# Release: tag v* → binarios 4 plataformas → release público → formula al tap.
# Secrets requeridos:
#   INSTALLER_TOKEN — lee andresgarcia29/harness-creator (privado)
#   TAP_TOKEN       — escribe andresgarcia29/homebrew-agm
name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: checkout harness-installer (privado — fuente de los assets)
        uses: actions/checkout@v4
        with:
          repository: andresgarcia29/harness-creator
          token: ${{ secrets.INSTALLER_TOKEN }}
          path: harness-installer
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: drift de assets embebidos (bloqueante)
        run: ./scripts/sync-assets.sh --check ./harness-installer
      - name: tests
        run: go vet ./... && go test ./...
      - name: dist (4 plataformas)
        run: make dist VERSION="${GITHUB_REF_NAME#v}"
      - name: selftest del binario linux
        run: chmod +x dist/harnessd-linux-amd64 && ./dist/harnessd-linux-amd64 selftest
      - name: release en GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/harnessd-* dist/SHA256SUMS \
            --title "harness $GITHUB_REF_NAME" \
            --notes "Instala con: brew install andresgarcia29/agm/harness — o baja el binario de tu plataforma."
      - name: formula al tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          ./scripts/gen-formula.sh "${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/andresgarcia29/homebrew-agm.git" tap
          mkdir -p tap/Formula
          cp dist/harness.rb tap/Formula/harness.rb
          cd tap
          git config user.name "harness-release-bot"
          git config user.email "noreply@github.com"
          git add Formula/harness.rb
          git commit -m "harness ${GITHUB_REF_NAME}" || echo "sin cambios"
          git push
