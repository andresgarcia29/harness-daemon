# Codegen del CONTRATO de lectura daemon→UI (ADR-0003, workspace corvux).
# Los structs Go de internal/api son la fuente de verdad; tygo emite los tipos
# TS que la UI consume. Regenerar con `go generate ./...` (ver contract/gen.go)
# o `tygo generate`. El drift entre Go y TS se vuelve un error de build en la UI.
packages:
  - path: "github.com/andresgarcia29/harness-daemon/internal/api"
    output_path: "harness.gen.ts"
    type_mappings:
      "time.Time": "string"
    frontmatter: |
      // Code generated by tygo from internal/api. DO NOT EDIT.
      // Fuente de verdad: los structs Go del daemon. Regenerar: `go generate ./...`.
      // Contrato daemon→UI — ver ADR-0003 (workspace corvux).
